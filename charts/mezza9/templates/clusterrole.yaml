{{- if .Values.rbac.create -}}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "mezza9.fullname" . }}
  labels:
    {{- include "mezza9.labels" . | nindent 4 }}
rules:
  # Read access to everything. The wildcard covers all built-in types the UI lists
  # plus arbitrary CRD instances it can browse (and pods/log via subresource match).
  - apiGroups: ["*"]
    resources: ["*"]
    verbs: ["get", "list", "watch"]
{{- if not .Values.rbac.readOnly }}
  # Mutating actions the UI performs: delete, edit (kubectl apply / patch),
  # port-forward (pods/portforward create), and helm rollback.
  - apiGroups: ["*"]
    resources: ["*"]
    verbs: ["create", "update", "patch", "delete", "deletecollection"]
{{- end }}
{{- end }}
